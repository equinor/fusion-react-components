name: Refresh Bun lockfile for Dependabot

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  update-bun-lock:
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Bun and Node
        uses: ./.github/workflows/actions/node-setup

      - name: Commit refreshed bun.lock
        shell: bash
        run: |
          if git diff --quiet -- bun.lock; then
            echo 'bun.lock already up to date'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bun.lock
          git commit -m 'chore: refresh bun.lock'
          git push origin "HEAD:refs/heads/${{ github.event.pull_request.head.ref }}"
